name: Deploy Complex to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_LOCATION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test
        continue-on-error: true
        run: |- 
          docker build -t complex-kube-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true complex-kube-test npm test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build images
        run: |
          docker build --platform linux/amd64 -t zizutg/multi-client:${{ github.sha }} ./client
          docker build --platform linux/amd64 -t zizutg/multi-server:${{ github.sha }} ./server
          docker build --platform linux/amd64 -t zizutg/multi-worker:${{ github.sha }} ./worker

      - name: Push images
        run: |
          docker push zizutg/multi-client:${{ github.sha }}
          docker push zizutg/multi-server:${{ github.sha }}
          docker push zizutg/multi-worker:${{ github.sha }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Create Postgres password secret
        run: |
          kubectl create secret generic pgpassword \
            --from-literal=PGPASSWORD='${{ secrets.PGPASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes config
        run: kubectl apply -f k8s

      - name: Update Kubernetes images
        run: |
          kubectl set image deployment/client-deployment client=zizutg/multi-client:${{ github.sha }}
          kubectl set image deployment/server-deployment server=zizutg/multi-server:${{ github.sha }}
          kubectl set image deployment/worker-deployment worker=zizutg/multi-worker:${{ github.sha }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/client-deployment
          kubectl rollout status deployment/server-deployment
          kubectl rollout status deployment/worker-deployment
          
